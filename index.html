<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule•Us Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body {
            font-family: 'Plus Jakarta Sans', sans-serif;
        }

        .modal-active {
            display: flex !important;
            animation: fadeIn 0.2s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        @keyframes slideUp {
            from { transform: translateY(20px); opacity: 0; }
            to { transform: translateY(0); opacity: 1; }
        }

        .modal-content {
            animation: slideUp 0.3s ease-out;
        }

        /* Hide scrollbar for Chrome, Safari and Opera */
        .no-scrollbar::-webkit-scrollbar {
            display: none;
        }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            .print-container { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; }
            .shadow-xl { box-shadow: none !important; }
            .border { border: 1px solid #e2e8f0 !important; }
            .bg-slate-50, .dark\:bg-slate-950 { background: white !important; }
            .bg-white, .dark\:bg-slate-900 { background: white !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen pb-20 transition-colors duration-300">

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-pink-500 p-2 rounded-xl shadow-lg shadow-pink-500/30">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight leading-none">Schedule•Us</h1>
                    <p class="text-[10px] text-pink-500 font-bold uppercase tracking-widest mt-1 no-print">Cloud Synced</p>
                </div>
            </div>
            <div class="flex items-center gap-3 no-print">
                <button onclick="window.print()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition text-slate-500">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </button>
                <div class="flex items-center gap-2 px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full">
                    <div id="statusIndicator" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                    <span id="statusText" class="text-[10px] font-bold uppercase tracking-wider">Syncing</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6 print-container">
        
        <!-- Navigation -->
        <section class="mb-6 flex flex-col md:flex-row gap-4 items-center justify-between no-print">
            <div class="flex items-center gap-1 bg-white dark:bg-slate-900 p-1 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <span id="monthLabel" class="px-4 py-1 text-sm font-extrabold text-slate-700 dark:text-slate-200 min-w-[140px] text-center">Memuat...</span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>

            <div class="relative w-full md:w-64">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="number" id="searchInput" placeholder="Cari tanggal..." oninput="highlightRow(this.value)"
                    class="w-full pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-pink-500 focus:outline-none text-sm transition">
            </div>
        </section>

        <!-- Stats -->
        <section class="grid grid-cols-2 gap-4 mb-8">
            <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-5 rounded-[2rem] shadow-lg shadow-emerald-500/20 text-white">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Libur Bersama</p>
                <div id="statLibur" class="text-4xl font-black">0</div>
                <p class="text-[10px] mt-2 bg-white/20 inline-block px-3 py-1 rounded-full font-bold">Hari Kencan ✨</p>
            </div>
            <div class="bg-gradient-to-br from-amber-500 to-orange-600 p-5 rounded-[2rem] shadow-lg shadow-amber-500/20 text-white">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Shift Serasi</p>
                <div id="statShift" class="text-4xl font-black">0</div>
                <p class="text-[10px] mt-2 bg-white/20 inline-block px-3 py-1 rounded-full font-bold">Berangkat Bareng 🚗</p>
            </div>
        </section>

        <!-- Table -->
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 overflow-hidden shadow-xl shadow-slate-200/50 dark:shadow-none">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-800/50 text-slate-400 dark:text-slate-500 text-[10px] font-black uppercase tracking-widest border-b border-slate-100 dark:border-slate-800">
                            <th class="p-4 w-12 text-center">Tgl</th>
                            <th class="p-4 text-center">Suami</th>
                            <th class="p-4 text-center">Istri</th>
                            <th class="p-4 text-center hidden md:table-cell">Status</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody" class="divide-y divide-slate-100 dark:divide-slate-800">
                        <!-- Rows will be injected here -->
                    </tbody>
                </table>
            </div>
        </div>

        <!-- Legend -->
        <section class="mt-8 flex flex-wrap justify-center gap-4 text-[10px] font-extrabold no-print opacity-60">
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-amber-400"></span> P: PAGI</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-emerald-400"></span> S: SIANG</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-indigo-400"></span> M: MALAM</div>
            <div class="flex items-center gap-2"><span class="w-3 h-3 rounded-full bg-rose-400"></span> L/PH/C: LIBUR</div>
        </section>

        <footer class="mt-16 text-center pb-10 opacity-30">
            <p class="text-xs font-bold tracking-[0.2em] text-slate-500 uppercase">Idea by Wahyu Angga</p>
        </footer>
    </main>

    <!-- Modal Picker -->
    <div id="pickerModal" class="fixed inset-0 z-50 hidden flex-col items-end sm:items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="text-2xl font-black tracking-tight">Pilih Shift</h3>
                    <p id="pickerSub" class="text-xs text-slate-500 uppercase font-bold tracking-widest mt-1">Tanggal 1 • Suami</p>
                </div>
                <button onclick="closePicker()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-full hover:bg-slate-200 transition">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            
            <div class="grid grid-cols-3 gap-4">
                <button onclick="selectShift('P')" class="bg-amber-100 text-amber-700 border-amber-300 h-24 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-90">
                    <span class="text-2xl font-black">P</span>
                    <span class="text-[9px] font-bold uppercase">Pagi</span>
                </button>
                <button onclick="selectShift('S')" class="bg-emerald-100 text-emerald-700 border-emerald-300 h-24 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-90">
                    <span class="text-2xl font-black">S</span>
                    <span class="text-[9px] font-bold uppercase">Siang</span>
                </button>
                <button onclick="selectShift('M')" class="bg-indigo-100 text-indigo-700 border-indigo-300 h-24 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-90">
                    <span class="text-2xl font-black">M</span>
                    <span class="text-[9px] font-bold uppercase">Malam</span>
                </button>
                <button onclick="selectShift('L')" class="bg-rose-100 text-rose-700 border-rose-300 h-24 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-90">
                    <span class="text-2xl font-black">L</span>
                    <span class="text-[9px] font-bold uppercase">Libur</span>
                </button>
                <button onclick="selectShift('PH')" class="bg-rose-100 text-rose-700 border-rose-300 h-24 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-90">
                    <span class="text-2xl font-black">PH</span>
                    <span class="text-[9px] font-bold uppercase">Libur</span>
                </button>
                <button onclick="selectShift('C')" class="bg-rose-100 text-rose-700 border-rose-300 h-24 flex flex-col items-center justify-center rounded-3xl border-2 transition-all active:scale-90">
                    <span class="text-2xl font-black">C</span>
                    <span class="text-[9px] font-bold uppercase">Cuti</span>
                </button>
                <button onclick="selectShift('')" class="col-span-3 h-16 bg-slate-50 dark:bg-slate-800 text-slate-400 font-extrabold rounded-2xl flex items-center justify-center mt-2 border-2 border-dashed border-slate-200 dark:border-slate-700">
                    HAPUS JADWAL
                </button>
            </div>
        </div>
    </div>

    <!-- Firebase SDK -->
    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged, signInWithCustomToken } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getFirestore, doc, onSnapshot, setDoc } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-firestore.js";

        // Global state
        window.state = {
            user: null,
            currentDate: new Date(),
            schedule: {},
            activeTarget: null // { day, person }
        };

        // Firebase Configuration (Using provided Project Credentials)
        const firebaseConfig = typeof __firebase_config !== 'undefined' ? JSON.parse(__firebase_config) : {
            apiKey: "AIzaSyDzQ_dxJzgAbgjxsIYTLnHmpD00x8vEdxU",
            authDomain: "schedule-us-8a0bf.firebaseapp.com",
            projectId: "schedule-us-8a0bf",
            storageBucket: "schedule-us-8a0bf.firebasestorage.app",
            messagingSenderId: "816949754573",
            appId: "1:816949754573:web:737618eb5420903d6a8784"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        
        // Identifikasi App ID untuk struktur path Firestore yang aman
        const appId = typeof __app_id !== 'undefined' ? __app_id : 'schedule-us-8a0bf';

        const SHIFT_CLASSES = {
            P: 'bg-amber-100 text-amber-700 border-amber-300 dark:bg-amber-900/40 dark:text-amber-300',
            S: 'bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/40 dark:text-emerald-300',
            M: 'bg-indigo-100 text-indigo-700 border-indigo-300 dark:bg-indigo-900/40 dark:text-indigo-300',
            L: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300',
            PH: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300',
            C: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300',
            empty: 'bg-slate-100 dark:bg-slate-800 text-slate-300 dark:text-slate-700 border-transparent'
        };

        // --- Logic Handlers ---

        window.initApp = async () => {
            // Menggunakan token khusus jika ada (lingkungan kolaborasi), atau login anonim
            if (typeof __initial_auth_token !== 'undefined' && __initial_auth_token) {
                try {
                    await signInWithCustomToken(auth, __initial_auth_token);
                } catch (e) {
                    await signInAnonymously(auth);
                }
            } else {
                await signInAnonymously(auth);
            }

            onAuthStateChanged(auth, (user) => {
                window.state.user = user;
                if (user) startSync();
            });
        };

        let unsubscribe = null;
        function startSync() {
            if (unsubscribe) unsubscribe();

            const month = window.state.currentDate.getMonth();
            const year = window.state.currentDate.getFullYear();
            
            // Mengikuti RULE 1: /artifacts/{appId}/public/data/{collectionName}
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', `schedule_${year}_${month}`);

            document.getElementById('statusIndicator').className = 'w-2 h-2 rounded-full bg-amber-500 animate-pulse';
            document.getElementById('statusText').innerText = 'Syncing';

            unsubscribe = onSnapshot(docRef, (docSnap) => {
                window.state.schedule = docSnap.exists() ? docSnap.data() : {};
                renderCalendar();
                updateStats();
                document.getElementById('statusIndicator').className = 'w-2 h-2 rounded-full bg-green-500';
                document.getElementById('statusText').innerText = 'Live';
            }, (err) => {
                console.error("Firestore sync error:", err);
                document.getElementById('statusText').innerText = 'Offline';
            });
        }

        function renderCalendar() {
            const container = document.getElementById('scheduleBody');
            const date = window.state.currentDate;
            const month = date.getMonth();
            const year = date.getFullYear();
            const daysInMonth = new Date(year, month + 1, 0).getDate();

            document.getElementById('monthLabel').innerText = date.toLocaleString('id-ID', { month: 'long', year: 'numeric' });

            let html = '';
            for (let d = 1; d <= daysInMonth; d++) {
                const hVal = window.state.schedule[`h-${d}`] || '';
                const wVal = window.state.schedule[`w-${d}`] || '';
                
                const isMatchingLibur = ['L', 'PH', 'C'].includes(hVal) && ['L', 'PH', 'C'].includes(wVal);
                const isMatchingKerja = hVal && hVal === wVal && ['P', 'S', 'M'].includes(hVal);

                html += `
                    <tr id="row-${d}" class="${isMatchingLibur ? 'bg-emerald-50/40 dark:bg-emerald-950/20' : ''} ${isMatchingKerja ? 'bg-amber-50/40 dark:bg-amber-950/20' : ''} transition-all duration-300">
                        <td class="p-4 text-center font-bold text-slate-300 dark:text-slate-600">${d}</td>
                        <td class="p-2">
                            <button onclick="openPicker(${d}, 'h')" class="w-full h-12 rounded-2xl border-2 font-black flex items-center justify-center transition-all active:scale-95 ${SHIFT_CLASSES[hVal] || SHIFT_CLASSES.empty}">
                                ${hVal || '-'}
                            </button>
                        </td>
                        <td class="p-2">
                            <button onclick="openPicker(${d}, 'w')" class="w-full h-12 rounded-2xl border-2 font-black flex items-center justify-center transition-all active:scale-95 ${SHIFT_CLASSES[wVal] || SHIFT_CLASSES.empty}">
                                ${wVal || '-'}
                            </button>
                        </td>
                        <td class="p-2 text-center hidden md:table-cell">
                            ${isMatchingLibur ? '<span class="text-[9px] font-black px-3 py-1 bg-emerald-500 text-white rounded-full">LIBUR BERSAMA</span>' : ''}
                            ${isMatchingKerja ? '<span class="text-[9px] font-black px-3 py-1 bg-amber-500 text-white rounded-full">SHIFT SAMA</span>' : ''}
                        </td>
                    </tr>
                `;
            }
            container.innerHTML = html;
        }

        function updateStats() {
            let libur = 0, shift = 0;
            const days = new Date(window.state.currentDate.getFullYear(), window.state.currentDate.getMonth() + 1, 0).getDate();
            
            for (let d = 1; d <= days; d++) {
                const h = (window.state.schedule[`h-${d}`] || '').toUpperCase();
                const w = (window.state.schedule[`w-${d}`] || '').toUpperCase();
                if (h && w) {
                    if (['L', 'PH', 'C'].includes(h) && ['L', 'PH', 'C'].includes(w)) libur++;
                    else if (h === w && ['P', 'S', 'M'].includes(h)) shift++;
                }
            }
            document.getElementById('statLibur').innerText = libur;
            document.getElementById('statShift').innerText = shift;
        }

        // --- Window Globals ---

        window.changeMonth = (offset) => {
            const d = window.state.currentDate;
            window.state.currentDate = new Date(d.getFullYear(), d.getMonth() + offset, 1);
            startSync();
        };

        window.openPicker = (day, person) => {
            window.state.activeTarget = { day, person };
            document.getElementById('pickerSub').innerText = `Tgl ${day} • ${person === 'h' ? 'Suami' : 'Istri'}`;
            document.getElementById('pickerModal').classList.add('modal-active');
        };

        window.closePicker = () => {
            document.getElementById('pickerModal').classList.remove('modal-active');
        };

        window.selectShift = async (val) => {
            if (!window.state.user || !window.state.activeTarget) return;
            
            const { day, person } = window.state.activeTarget;
            const month = window.state.currentDate.getMonth();
            const year = window.state.currentDate.getFullYear();
            const docRef = doc(db, 'artifacts', appId, 'public', 'data', `schedule_${year}_${month}`);
            
            const key = `${person}-${day}`;
            try {
                await setDoc(docRef, { [key]: val }, { merge: true });
            } catch (e) {
                console.error("Save error:", e);
            }
            closePicker();
        };

        window.highlightRow = (val) => {
            document.querySelectorAll('tr[id^="row-"]').forEach(r => r.classList.remove('ring-4', 'ring-pink-500/30', 'bg-pink-50', 'dark:bg-pink-900/10'));
            if (val && document.getElementById(`row-${val}`)) {
                const target = document.getElementById(`row-${val}`);
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('ring-4', 'ring-pink-500/30', 'bg-pink-50', 'dark:bg-pink-900/10');
            }
        };

        window.onload = window.initApp;

    </script>
</body>
</html>
