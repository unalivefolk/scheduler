<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schedule•Us Pro</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;800&display=swap');
        
        body { font-family: 'Plus Jakarta Sans', sans-serif; }
        .modal-active { display: flex !important; animation: fadeIn 0.2s ease-out; }
        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }
        @keyframes slideUp { from { transform: translateY(20px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        .modal-content { animation: slideUp 0.3s ease-out; }

        @media print {
            .no-print { display: none !important; }
            body { background: white; color: black; }
            .print-container { width: 100% !important; max-width: none !important; margin: 0 !important; padding: 0 !important; }
        }
    </style>
</head>
<body class="bg-slate-50 dark:bg-slate-950 text-slate-900 dark:text-slate-100 min-h-screen pb-20 transition-colors duration-300">

    <!-- Navbar -->
    <nav class="sticky top-0 z-40 bg-white/80 dark:bg-slate-900/80 backdrop-blur-md border-b border-slate-200 dark:border-slate-800 p-4">
        <div class="max-w-4xl mx-auto flex justify-between items-center">
            <div class="flex items-center gap-3">
                <div class="bg-pink-500 p-2 rounded-xl shadow-lg shadow-pink-500/30">
                    <svg class="w-5 h-5 text-white" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="3"><path stroke-linecap="round" stroke-linejoin="round" d="M8 7V3m8 4V3m-9 8h10M5 21h14a2 2 0 002-2V7a2 2 0 00-2-2H5a2 2 0 00-2 2v12a2 2 0 002 2z" /></svg>
                </div>
                <div>
                    <h1 class="text-xl font-extrabold tracking-tight leading-none">Schedule•Us</h1>
                    <p class="text-[10px] text-pink-500 font-bold uppercase tracking-widest mt-1 no-print">Secure & Restricted</p>
                </div>
            </div>
            <div class="flex items-center gap-3 no-print">
                <button onclick="window.print()" class="p-2 hover:bg-slate-100 dark:hover:bg-slate-800 rounded-full transition text-slate-500">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M17 17h2a2 2 0 002-2v-4a2 2 0 00-2-2H5a2 2 0 00-2 2v4a2 2 0 002 2h2m2 4h6a2 2 0 002-2v-4a2 2 0 00-2-2H9a2 2 0 00-2 2v4a2 2 0 002 2zm8-12V5a2 2 0 00-2-2H9a2 2 0 00-2 2v4h10z" /></svg>
                </button>
                <div class="flex items-center gap-2 px-3 py-1 bg-slate-100 dark:bg-slate-800 rounded-full">
                    <div id="statusIndicator" class="w-2 h-2 rounded-full bg-amber-500 animate-pulse"></div>
                    <span id="statusText" class="text-[10px] font-bold uppercase tracking-wider">Connecting</span>
                </div>
            </div>
        </div>
    </nav>

    <main class="max-w-4xl mx-auto px-4 py-6 print-container">
        <!-- Peringatan Keamanan jika terjadi error -->
        <div id="securityAlert" class="hidden mb-6 p-4 bg-rose-100 border border-rose-200 text-rose-700 rounded-2xl text-sm font-medium no-print">
            <div class="flex items-center gap-2">
                <svg class="w-5 h-5 shrink-0" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z" /></svg>
                <p id="securityAlertMsg">Akses ditolak. Pastikan domain ini sudah terdaftar di Google Cloud Console.</p>
            </div>
        </div>
        
        <!-- Navigation -->
        <section class="mb-6 flex flex-col md:flex-row gap-4 items-center justify-between no-print">
            <div class="flex items-center gap-1 bg-white dark:bg-slate-900 p-1 rounded-2xl shadow-sm border border-slate-200 dark:border-slate-800">
                <button onclick="changeMonth(-1)" class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7" /></svg>
                </button>
                <span id="monthLabel" class="px-4 py-1 text-sm font-extrabold text-slate-700 dark:text-slate-200 min-w-[140px] text-center">Memuat...</span>
                <button onclick="changeMonth(1)" class="p-2 hover:bg-slate-50 dark:hover:bg-slate-800 rounded-xl transition">
                    <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M9 5l7 7-7 7" /></svg>
                </button>
            </div>

            <div class="relative w-full md:w-64">
                <svg class="absolute left-3 top-1/2 -translate-y-1/2 w-4 h-4 text-slate-400" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" /></svg>
                <input type="number" id="searchInput" placeholder="Cari tanggal..." oninput="highlightRow(this.value)"
                    class="w-full pl-10 pr-4 py-2 bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 rounded-2xl focus:ring-2 focus:ring-pink-500 focus:outline-none text-sm transition">
            </div>
        </section>

        <!-- Stats -->
        <section class="grid grid-cols-2 gap-4 mb-6">
            <div class="bg-gradient-to-br from-emerald-500 to-teal-600 p-5 rounded-[2rem] shadow-lg shadow-emerald-500/20 text-white">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Libur Bersama</p>
                <div id="statLibur" class="text-4xl font-black">0</div>
            </div>
            <div class="bg-gradient-to-br from-amber-500 to-orange-600 p-5 rounded-[2rem] shadow-lg shadow-amber-500/20 text-white">
                <p class="text-[10px] font-black uppercase tracking-widest opacity-80 mb-1">Shift Serasi</p>
                <div id="statShift" class="text-4xl font-black">0</div>
            </div>
        </section>

        <!-- Agenda Section -->
        <section id="agendaSection" class="mb-8 no-print hidden">
            <h3 class="text-xs font-black uppercase tracking-[0.2em] text-slate-400 mb-4 px-2">Agenda Serasi ✨</h3>
            <div id="agendaList" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 gap-3">
                </div>
        </section>

        <!-- Main Table -->
        <div class="bg-white dark:bg-slate-900 rounded-[2.5rem] border border-slate-200 dark:border-slate-800 overflow-hidden shadow-xl shadow-slate-200/50 dark:shadow-none mb-8">
            <div class="overflow-x-auto">
                <table class="w-full text-left border-collapse">
                    <thead>
                        <tr class="bg-slate-50 dark:bg-slate-800/50 text-slate-400 dark:text-slate-500 text-[10px] font-black uppercase tracking-widest border-b border-slate-100 dark:border-slate-800">
                            <th class="p-4 w-12 text-center">Tgl</th>
                            <th class="p-4 text-center">Suami</th>
                            <th class="p-4 text-center">Istri</th>
                            <th class="p-4 text-center hidden md:table-cell">Status</th>
                        </tr>
                    </thead>
                    <tbody id="scheduleBody" class="divide-y divide-slate-100 dark:divide-slate-800"></tbody>
                </table>
            </div>
        </div>

        <!-- Action Reset -->
        <div class="flex justify-center mb-8 no-print">
            <button onclick="openResetModal()" class="flex items-center gap-2 px-6 py-3 bg-rose-50 dark:bg-rose-900/20 text-rose-600 dark:text-rose-400 font-bold rounded-2xl border border-rose-100 dark:border-rose-900/30 hover:bg-rose-100 transition active:scale-95">
                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2"><path stroke-linecap="round" stroke-linejoin="round" d="M19 7l-.867 12.142A2 2 0 0116.138 21H7.862a2 2 0 01-1.995-1.858L5 7m5 4v6m4-6v6m1-10V4a1 1 0 00-1-1h-4a1 1 0 00-1 1v3M4 7h16" /></svg>
                Reset Data Bulan Ini
            </button>
        </div>
    </main>

    <!-- Modals (Picker & Reset) -->
    <div id="pickerModal" class="fixed inset-0 z-50 hidden flex-col items-end sm:items-center justify-center p-4 bg-slate-950/60 backdrop-blur-sm">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8">
            <div class="flex justify-between items-center mb-8">
                <div>
                    <h3 class="text-2xl font-black">Pilih Shift</h3>
                    <p id="pickerSub" class="text-xs text-slate-500 uppercase font-bold mt-1"></p>
                </div>
                <button onclick="closePicker()" class="p-3 bg-slate-100 dark:bg-slate-800 rounded-full">
                    <svg class="w-6 h-6" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2.5"><path stroke-linecap="round" stroke-linejoin="round" d="M6 18L18 6M6 6l12 12" /></svg>
                </button>
            </div>
            <div class="grid grid-cols-3 gap-4">
                <button onclick="selectShift('P')" class="bg-amber-100 text-amber-700 h-20 rounded-3xl font-black">P</button>
                <button onclick="selectShift('S')" class="bg-emerald-100 text-emerald-700 h-20 rounded-3xl font-black">S</button>
                <button onclick="selectShift('M')" class="bg-indigo-100 text-indigo-700 h-20 rounded-3xl font-black">M</button>
                <button onclick="selectShift('L')" class="bg-rose-100 text-rose-700 h-20 rounded-3xl font-black">L</button>
                <button onclick="selectShift('PH')" class="bg-rose-100 text-rose-700 h-20 rounded-3xl font-black">PH</button>
                <button onclick="selectShift('C')" class="bg-rose-100 text-rose-700 h-20 rounded-3xl font-black">C</button>
                <button onclick="selectShift('')" class="col-span-3 h-12 bg-slate-100 text-slate-400 font-bold rounded-xl mt-2 italic">Hapus</button>
            </div>
        </div>
    </div>

    <div id="resetModal" class="fixed inset-0 z-[60] hidden flex-col items-center justify-center p-4 bg-slate-950/80 backdrop-blur-md">
        <div class="modal-content bg-white dark:bg-slate-900 w-full max-w-sm rounded-[2.5rem] p-8 text-center">
            <h3 class="text-2xl font-black mb-2">Hapus Jadwal?</h3>
            <p id="resetModalText" class="text-slate-500 text-sm mb-8"></p>
            <div class="flex flex-col gap-3">
                <button onclick="executeReset()" class="w-full py-4 bg-rose-500 text-white font-black rounded-2xl shadow-lg shadow-rose-500/30">YA, HAPUS SEMUA</button>
                <button onclick="closeResetModal()" class="w-full py-4 bg-slate-100 text-slate-600 font-bold rounded-2xl">BATALKAN</button>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-app.js";
        import { getAuth, signInAnonymously, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-auth.js";
        import { getDatabase, ref, onValue, update, remove } from "https://www.gstatic.com/firebasejs/11.0.1/firebase-database.js";

        window.state = { currentDate: new Date(), schedule: {}, user: null };

        const firebaseConfig = {
            apiKey: "AIzaSyDzQ_dxJzgAbgjxsIYTLnHmpD00x8vEdxU",
            authDomain: "schedule-us-8a0bf.firebaseapp.com",
            databaseURL: "https://schedule-us-8a0bf-default-rtdb.asia-southeast1.firebasedatabase.app",
            projectId: "schedule-us-8a0bf",
            storageBucket: "schedule-us-8a0bf.firebasestorage.app",
            messagingSenderId: "816949754573",
            appId: "1:816949754573:web:737618eb5420903d6a8784"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getDatabase(app);

        const SHIFT_CLASSES = {
            P: 'bg-amber-100 text-amber-700 border-amber-300 dark:bg-amber-900/40 dark:text-amber-300',
            S: 'bg-emerald-100 text-emerald-700 border-emerald-300 dark:bg-emerald-900/40 dark:text-emerald-300',
            M: 'bg-indigo-100 text-indigo-700 border-indigo-300 dark:bg-indigo-900/40 dark:text-indigo-300',
            L: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300',
            PH: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300',
            C: 'bg-rose-100 text-rose-700 border-rose-300 dark:bg-rose-900/40 dark:text-rose-300',
            empty: 'bg-slate-100 dark:bg-slate-800 text-slate-300 dark:text-slate-700 border-transparent'
        };

        // Initialize Authentication
        async function startApp() {
            try {
                await signInAnonymously(auth);
            } catch (err) {
                console.error("Auth failed:", err);
                document.getElementById('securityAlert').classList.remove('hidden');
                document.getElementById('securityAlertMsg').innerText = "Gagal Autentikasi. Jika Anda baru saja membatasi API Key, pastikan domain ini terdaftar.";
            }
        }

        onAuthStateChanged(auth, (user) => { 
            window.state.user = user; 
            if (user) startSync(); 
        });

        let currentListener = null;
        function startSync() {
            const month = window.state.currentDate.getMonth();
            const year = window.state.currentDate.getFullYear();
            const dbRef = ref(db, `schedules/${year}_${month}`);
            
            document.getElementById('statusIndicator').className = 'w-2 h-2 rounded-full bg-amber-500 animate-pulse';
            document.getElementById('statusText').innerText = 'Syncing';
            
            if (currentListener) currentListener();
            
            currentListener = onValue(dbRef, (snapshot) => {
                window.state.schedule = snapshot.val() || {};
                renderCalendar();
                updateStatsAndAgenda();
                document.getElementById('statusIndicator').className = 'w-2 h-2 rounded-full bg-green-500';
                document.getElementById('statusText').innerText = 'Live';
            }, (error) => {
                console.error("Sync Error:", error);
                document.getElementById('statusText').innerText = 'Access Denied';
            });
        }

        function renderCalendar() {
            const container = document.getElementById('scheduleBody');
            const date = window.state.currentDate;
            const daysInMonth = new Date(date.getFullYear(), date.getMonth() + 1, 0).getDate();
            document.getElementById('monthLabel').innerText = date.toLocaleString('id-ID', { month: 'long', year: 'numeric' });

            let html = '';
            for (let d = 1; d <= daysInMonth; d++) {
                const hVal = window.state.schedule[`h-${d}`] || '';
                const wVal = window.state.schedule[`w-${d}`] || '';
                const isLibur = ['L', 'PH', 'C'].includes(hVal) && ['L', 'PH', 'C'].includes(wVal);
                const isKerja = hVal && hVal === wVal && ['P', 'S', 'M'].includes(hVal);

                html += `
                    <tr id="row-${d}" class="${isLibur ? 'bg-emerald-50/40 dark:bg-emerald-950/20' : ''} ${isKerja ? 'bg-amber-50/40 dark:bg-amber-950/20' : ''} transition-all">
                        <td class="p-4 text-center font-bold text-slate-300 dark:text-slate-600">${d}</td>
                        <td class="p-2">
                            <button onclick="openPicker(${d}, 'h')" class="w-full h-12 rounded-2xl border-2 font-black ${SHIFT_CLASSES[hVal] || SHIFT_CLASSES.empty}">${hVal || '-'}</button>
                        </td>
                        <td class="p-2">
                            <button onclick="openPicker(${d}, 'w')" class="w-full h-12 rounded-2xl border-2 font-black ${SHIFT_CLASSES[wVal] || SHIFT_CLASSES.empty}">${wVal || '-'}</button>
                        </td>
                        <td class="p-2 text-center hidden md:table-cell">
                            ${isLibur ? '<span class="text-[9px] font-black px-3 py-1 bg-emerald-500 text-white rounded-full uppercase">Libur</span>' : ''}
                            ${isKerja ? '<span class="text-[9px] font-black px-3 py-1 bg-amber-500 text-white rounded-full uppercase">Shift Sama</span>' : ''}
                        </td>
                    </tr>
                `;
            }
            container.innerHTML = html;
        }

        function updateStatsAndAgenda() {
            let liburCount = 0, shiftCount = 0;
            let agendaHtml = '';
            const days = new Date(window.state.currentDate.getFullYear(), window.state.currentDate.getMonth() + 1, 0).getDate();
            
            for (let d = 1; d <= days; d++) {
                const h = (window.state.schedule[`h-${d}`] || '');
                const w = (window.state.schedule[`w-${d}`] || '');
                
                if (h && w) {
                    if (['L', 'PH', 'C'].includes(h) && ['L', 'PH', 'C'].includes(w)) {
                        liburCount++;
                        agendaHtml += createAgendaCard(d, 'Libur', 'bg-emerald-500');
                    } else if (h === w && ['P', 'S', 'M'].includes(h)) {
                        shiftCount++;
                        agendaHtml += createAgendaCard(d, `Shift ${h}`, 'bg-amber-500');
                    }
                }
            }

            document.getElementById('statLibur').innerText = liburCount;
            document.getElementById('statShift').innerText = shiftCount;
            
            const agendaList = document.getElementById('agendaList');
            const agendaSection = document.getElementById('agendaSection');
            
            if (agendaHtml) {
                agendaList.innerHTML = agendaHtml;
                agendaSection.classList.remove('hidden');
            } else {
                agendaSection.classList.add('hidden');
            }
        }

        function createAgendaCard(day, label, colorClass) {
            return `
                <div onclick="highlightRow(${day})" class="cursor-pointer bg-white dark:bg-slate-900 border border-slate-200 dark:border-slate-800 p-3 rounded-2xl flex items-center gap-3 hover:border-pink-300 transition-all active:scale-95 shadow-sm">
                    <div class="w-10 h-10 ${colorClass} text-white flex flex-col items-center justify-center rounded-xl shrink-0">
                        <span class="text-[8px] font-black uppercase leading-none opacity-70">TGL</span>
                        <span class="text-lg font-black leading-none">${day}</span>
                    </div>
                    <div class="overflow-hidden">
                        <p class="text-[10px] font-black text-slate-400 uppercase tracking-widest truncate">${label}</p>
                        <p class="text-[9px] font-bold text-pink-500 uppercase">Lihat Detail</p>
                    </div>
                </div>
            `;
        }

        // Global methods
        window.changeMonth = (offset) => {
            window.state.currentDate = new Date(window.state.currentDate.getFullYear(), window.state.currentDate.getMonth() + offset, 1);
            startSync();
        };

        window.openPicker = (day, person) => {
            window.state.activeTarget = { day, person };
            document.getElementById('pickerSub').innerText = `Tgl ${day} • ${person === 'h' ? 'Suami' : 'Istri'}`;
            document.getElementById('pickerModal').classList.add('modal-active');
        };

        window.closePicker = () => document.getElementById('pickerModal').classList.remove('modal-active');

        window.selectShift = async (val) => {
            const { day, person } = window.state.activeTarget;
            const month = window.state.currentDate.getMonth();
            const year = window.state.currentDate.getFullYear();
            await update(ref(db, `schedules/${year}_${month}`), { [`${person}-${day}`]: val });
            closePicker();
        };

        window.openResetModal = () => {
            document.getElementById('resetModalText').innerText = `Hapus semua data bulan ${document.getElementById('monthLabel').innerText}?`;
            document.getElementById('resetModal').classList.add('modal-active');
        };

        window.closeResetModal = () => document.getElementById('resetModal').classList.remove('modal-active');

        window.executeReset = async () => {
            const month = window.state.currentDate.getMonth();
            const year = window.state.currentDate.getFullYear();
            await remove(ref(db, `schedules/${year}_${month}`));
            closeResetModal();
        };

        window.highlightRow = (val) => {
            document.querySelectorAll('tr[id^="row-"]').forEach(r => r.classList.remove('ring-4', 'ring-pink-500/30', 'bg-pink-50', 'dark:bg-pink-900/10'));
            const target = document.getElementById(`row-${val}`);
            if (target) {
                target.scrollIntoView({ behavior: 'smooth', block: 'center' });
                target.classList.add('ring-4', 'ring-pink-500/30', 'bg-pink-50', 'dark:bg-pink-900/10');
            }
        };

        // Start Application
        startApp();
    </script>
</body>
</html>
